name: Validate Brev Scripts

on:
  push:
    branches: [main]
    paths:
      - scripts/**
      - configs/**
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Syntax check dispatch server
        run: node --check scripts/brev-dispatch-server.js

      - name: Lint setup script
        run: bash -n scripts/brev-setup.sh

      - name: Lint entrypoint
        run: bash -n scripts/agent-entrypoint.sh
